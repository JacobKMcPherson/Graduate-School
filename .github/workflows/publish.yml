name: Publish Quarto Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up bundle extension
        run: |
          case "$RUNNER_OS" in
            Linux)
              echo "BUNDLE_EXT=linux.tgz" >> $GITHUB_ENV
              ;;
            Windows)
              echo "BUNDLE_EXT=win.msi" >> $GITHUB_ENV
              ;;
            *)
              echo "$RUNNER_OS not supported"
              exit 1
              ;;
          esac

      - name: Initialize gh-pages branch
        run: |
          if ! git ls-remote --exit-code origin gh-pages 2>/dev/null; then
            git config user.email "github-actions@github.com"
            git config user.name "GitHub Actions"
            git checkout --orphan gh-pages
            git rm -rf .
            git commit --allow-empty -m "Initialize gh-pages"
            git push origin gh-pages
            git checkout main
          fi

      - name: Render and Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
