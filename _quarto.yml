project:
  type: website
  output-dir: _site

website:
  title: "PhD Graduate Student Experience"
  description: "Practical resources for PhD students: salary, wealth, family, health, and career."
  favicon: "thinking.png"
  repo-url: https://github.com/mcphersonlab/graduate-school
  repo-actions: [edit, issue]
  navbar:
    left:
      - href: index.qmd
        text: Home
    right:
      - icon: github
        href: https://github.com/mcphersonlab/graduate-school
  sidebar:
    style: docked
    search: true
    contents:
      - index.qmd
      - student_experience/salary_and_cost_of_living.qmd
      - student_experience/wealth_building.qmd
      - student_experience/family_planning.qmd
      - student_experience/health_insurance.qmd
      - student_experience/career_roi.qmd

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    page-layout: full
    toc: true
    toc-depth: 3
    toc-title: "On this page"
    code-fold: true
    css: styles/site.css
    smooth-scroll: false
    link-external-newwindow: true
    include-after-body: _slides-footer.html
